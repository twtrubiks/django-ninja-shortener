
x-base-app-setting: &x-base-app
  image: ninja-shortener-app
  build: .
  volumes:
    - .:/ninja_shortener

services:

    migration:
      <<: *x-base-app
      command: bash -c "python manage.py makemigrations && python manage.py migrate"

    test:
      # 這個服務專門用來跑測試
      # docker compose up   # 啟動常規服務，跳過測試。
      # docker compose up test # 只運行測試及其直接依賴。
      # docker compose --profile testing up # 啟動所有 被標記 profile: "testing" 的服務
      <<: *x-base-app
      command: bash -c "pytest --cov=. --cov-report=html"
      # command: bash -c "pytest -s" # print log
      profiles:
        - "testing"

    django-ninja:
      <<: *x-base-app
      command: bash -c "python manage.py runserver 0.0.0.0:8000"
      restart: always
      ports:
        - "8000:8000"
      # depends_on:
      #   - django-postgres

    # django-postgres:
    #   image: postgres:16
    #   ports:
    #     - "5432:5432"
    #   environment:
    #     - POSTGRES_DB=postgres
    #     - POSTGRES_USER=myuser
    #     - POSTGRES_PASSWORD=password123
    #     - PGDATA=/var/lib/postgresql/data/pgdata
    #   volumes:
    #     - db-data:/var/lib/postgresql/data/pgdata

    tailwind:
      <<: *x-base-app
      restart: "unless-stopped"
      command: bash -c "python manage.py tailwind install && python manage.py tailwind build && python manage.py tailwind start"
      # Without tty, no stdin, and tailwind watcher aborts
      # https://github.com/tailwindlabs/tailwindcss/issues/5324
      tty: true

